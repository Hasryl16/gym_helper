name: gym_helper
description: AI-powered real-time exercise form correction
version: 1.0.0+1

publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  google_mlkit_pose_detection: ^0.11.0
  camera: ^0.11.0
  provider: ^6.1.2
  go_router: ^14.0.0
  google_sign_in: ^6.2.0
  shared_preferences: ^2.3.0
  intl: ^0.19.0
  permission_handler: ^11.3.0
  google_fonts: ^6.2.1
  fl_chart: ^0.68.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
